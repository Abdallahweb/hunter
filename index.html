<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024,user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<link rel="icon" href="./hunter.gif">
<title>Hunter Game</title>

<style>
    body {
        margin: 0;
        background-image: url(forest.gif);
        min-width: 100000000000000000000000000000000000000000000000000000000px; 
        height: 100vh;
        overflow-x: hidden; 
        overflow-y: hidden;
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .hunter {
        position: fixed;
        left: 10px;
        top: 100px;
        z-index: 1000;
    }

    .jump {
        margin-top: -100px;
        height: 300px;
    }

    .dangerous {
        position: absolute;
        top: 280px;
    }

    .score {
        background: rgba(0,0,0,0.5);
        color: gold;
        font-size: 30px;
        font-weight: 700;
        text-shadow: 1px 1px 5px black;
        padding: 10px 20px;
        border-radius: 15px;
        border: none;
    }

    .go,
    .again {
        width: 220px;
        height: 50px;
        position: fixed;
        left: 50%;
        top: 550px;
        margin-left: -110px;
        border-radius: 25px;
        border: none;
        cursor: pointer;
        z-index: 10000;
        background-color: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        transition: 0.3s;
    }

    .go:hover,
    .again:hover {
        background-color: rgba(255, 215, 0, 0.8);
        color: black;
        transform: scale(1.05);
    }

    #over {
        position: fixed;
        top: 120px;
        left: 50%;
        width: 550px;
        height: 400px;
        margin-left: -275px;
        border-radius: 50px;
        display: none;
        box-shadow: 0 0 20px black;
    }

    #top-info {
        text-align: center;
        position: fixed;
        left: 50%;
        top: 10px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 15px;
        z-index: 1000;
    }

    #top-info img {
        vertical-align: middle;
    }
</style>
</head>

<body onload="startGame()">

<!-- top info -->
<div id="top-info">
    <button class="score" id="score">Your Score: 0</button>
</div>

<!-- hunter -->
<div class="hunter">
    <img src="./hunter.gif" id="hunter">
</div>

<button class="go" id="go">Click Space To Jump</button>
<button class="again" id="reload" onclick="reloadGame()" style="display:none;">Play Again</button>

<img src="./over.jpg" id="over">

<script src="./query.js"></script>

<script>

/* =====================
   GAME VARIABLES
===================== */
var score = 10;
var FinalScore = 0;
var scrollTimer, runTimer;

/* =====================
   START GAME
===================== */
function startGame() {
    jump();
    stopJump();
    createEnemy();

}

/* =====================
   CREATE ENEMY
===================== */
function createEnemy() {
    $("body").append('<img src="./lion.gif" class="dangerous">');
    var enemyPos = $(window).scrollLeft() + 3000;
    $(".dangerous").last().css({ left: enemyPos });
if (FinalScore >= 0) {
        $("#score").html("Your Score : " + FinalScore++);
}
}

/* =====================
   SCORE + SCROLL
===================== */
function updateScroll() {
    score += 10;
    $(window).scrollLeft(score);
}

/* =====================
   COLLISION CHECK
===================== */
function checkCollision() {
    var enemies = document.getElementsByClassName("dangerous");
    var scrollPos = $(window).scrollLeft();

    for (let i = 0; i < enemies.length; i++) {

        if (
            parseInt(enemies[i].style.left) === scrollPos &&
            !$("#hunter").hasClass("jump") 


        ) {

            gameOver(score);
        }
    }
}

/* =====================
   GAME OVER
===================== */
function gameOver(finalScore) {
    clearInterval(scrollTimer);
    clearInterval(runTimer);

    $("#hunter").animate({ "margin-left": "-500px" });
    $("#over").fadeIn(2000);
    $("#go").fadeOut();
    $("#reload").fadeIn(2000);
}

/* =====================
   CONTROLS
===================== */
function jump() {
    $("#hunter").addClass("jump");

}

function stopJump() {
    $("#hunter").removeClass("jump");
    setTimeout(createEnemy, 1000);
}

/* keyboard */
window.onkeydown = function (e) {
    if (e.keyCode === 32) jump();
};

window.onkeyup = function (e) {
    if (e.keyCode === 32) stopJump();
};

/* mouse */
window.onclick = function () {
    jump();
    setTimeout(stopJump, 1000);
};

/* =====================
   START LOOPS
===================== */
scrollTimer = setInterval(updateScroll, 10);
runTimer = setInterval(checkCollision, 10);

/* =====================
   RELOAD
===================== */
function reloadGame() {
    location.reload();
}

/* =====================
   FORCE DESKTOP ON MOBILE
===================== */
if (/Mobi|Android/i.test(navigator.userAgent)) {
    document.body.style.minWidth = "1000000000000000000000000000000000000px";
}
</script>
/* =====================
   DISABLE RIGHT CLICK AND SHORTCUTS
===================== */
    <script>
document.onkeydown = function (e) {
    if (
        e.ctrlKey &&
        (
            e.keyCode === 67 ||
            e.keyCode === 86 ||
            e.keyCode === 85 ||
            e.keyCode === 117
        )
    ) {
        return false;
    } else {
        return true;
    }
};

$(document).keypress("u", function (e) {
    if (e.ctrlKey) {
        return false;
    } else {
        return true;
    }
});

document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
}, false);

$(document).keydown(function (event) {
    if (event.keyCode == 123) {
        return false;
    } else if (event.ctrlKey && event.shiftKey && event.keyCode == 73) {
        return false;
    }
});
</script>

</body>
</html>
