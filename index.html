<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

<link rel="icon" href="./hunter.gif">
<title>Hunter Game</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background-image: url(forest.gif);
    width: 10000000000000000000000000000000px;
    min-height: 100vh;
    overflow: hidden;
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
    font-family: Arial, Helvetica, sans-serif;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at 20% 25%, rgba(255, 196, 87, 0.18), transparent 36%),
        radial-gradient(circle at 80% 70%, rgba(91, 214, 164, 0.18), transparent 38%),
        linear-gradient(120deg, rgba(0, 0, 0, 0.08), rgba(13, 72, 37, 0.17));
    mix-blend-mode: screen;
    animation: livelyGlow 8s ease-in-out infinite alternate;
    z-index: 1;
}

@keyframes livelyGlow {
    0% {
        opacity: 0.45;
        transform: scale(1) translateY(0);
    }
    100% {
        opacity: 0.88;
        transform: scale(1.03) translateY(-8px);
    }
}

.hud {
    position: fixed;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    width: min(94vw, 800px);
    padding: 0.65rem 1rem;
    border-radius: 999px;
    text-align: center;
    background: rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(8px);
    z-index: 9999;
}

.hud-icons img {
    width: clamp(30px, 4.5vw, 50px);
    vertical-align: middle;
}

.hunter {
    position: fixed;
    left: clamp(8px, 2vw, 24px);
    top: clamp(220px, 42vh, 340px);
    z-index: 100;
}

#hunter {
    width: clamp(190px, 24vw, 360px);
    height: auto;
    transition: transform 120ms ease, margin-top 120ms ease;
}

.jump {
    margin-top: -165px;
    transform: scale(1.04);
}

.dangerous {
    position: absolute;
    top: clamp(330px, 63vh, 450px);
    width: clamp(180px, 22vw, 340px);
    height: auto;
    filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.35));
}

.score {
    margin-top: 0.3rem;
    background: transparent;
    color: #ffca71;
    font-size: clamp(1rem, 2.3vw, 1.7rem);
    border: none;
    font-weight: 700;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
}

.go,
.again {
    width: min(90vw, 320px);
    min-height: 46px;
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: clamp(1rem, 6vh, 3rem);
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.35);
    cursor: pointer;
    z-index: 10000;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.68), rgba(29, 29, 29, 0.52));
    backdrop-filter: blur(10px);
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.2px;
}

.game-over-image {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(88vw, 560px);
    height: auto;
    max-height: 78vh;
    border-radius: 42px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
    display: none;
    z-index: 10001;
}

@media (max-width: 600px) {
    #hunter {
        width: clamp(160px, 45vw, 250px);
    }

    .hunter {
        top: clamp(240px, 55vh, 390px);
    }

    .jump {
        margin-top: -130px;
    }

    .dangerous {
        top: clamp(380px, 71vh, 520px);
        width: clamp(150px, 40vw, 240px);
    }
}

@media (min-width: 1200px) {
    #hunter {
        width: clamp(230px, 18vw, 390px);
    }

    .dangerous {
        width: clamp(210px, 17vw, 360px);
    }
}
</style>
</head>

<body onload="startGame()">

<!-- top info -->
<div class="hud">
    <div class="hud-icons">
        <img src="./hunter.gif" alt="Hunter">
        <img src="./lion.gif" alt="Enemy">
    </div>
    <button class="score" id="score"></button>
</div>

<!-- hunter -->
<div class="hunter">
    <img src="./hunter.gif" id="hunter">
</div>

<button class="go" id="go">Click Space To Jump</button>

<button class="again" id="reload" onclick="reloadGame()" style="display:none;font-weight:700">
    Play Again
</button>

<img src="./over.jpg"
     id="over"
     class="game-over-image"
     alt="Game over">

<script src="./query.js"></script>

<script>
/* =====================
   GAME VARIABLES
===================== */
var score = 10;
var scrollTimer, runTimer;

/* =====================
   START GAME
===================== */
function startGame() {
    jump();
    stopJump();
    createEnemy();
}

/* =====================
   CREATE ENEMY
===================== */
function createEnemy() {
    $("body").append('<img src="./lion.gif" class="dangerous">');
    var enemyPos = $(window).scrollLeft() + window.innerWidth + 450;
    $(".dangerous").last().css({ left: enemyPos });
}

/* =====================
   SCORE + SCROLL
===================== */
function updateScroll() {
    score += 10;
    $(window).scrollLeft(score);
    $("#score").html("Your Score : " + score);
}

/* =====================
   COLLISION CHECK
===================== */
function checkCollision() {
    var enemies = document.getElementsByClassName("dangerous");
    var hunter = document.getElementById("hunter");
    var hunterRect = hunter.getBoundingClientRect();
    var hunterHitbox = {
        left: hunterRect.left + hunterRect.width * 0.28,
        right: hunterRect.right - hunterRect.width * 0.28,
        top: hunterRect.top + hunterRect.height * 0.2,
        bottom: hunterRect.bottom - hunterRect.height * 0.16
    };

    for (let i = 0; i < enemies.length; i++) {
        var enemyRect = enemies[i].getBoundingClientRect();
        var enemyHitbox = {
            left: enemyRect.left + enemyRect.width * 0.3,
            right: enemyRect.right - enemyRect.width * 0.3,
            top: enemyRect.top + enemyRect.height * 0.18,
            bottom: enemyRect.bottom - enemyRect.height * 0.12
        };
        var overlapX = hunterHitbox.left < enemyHitbox.right && hunterHitbox.right > enemyHitbox.left;
        var overlapY = hunterHitbox.top < enemyHitbox.bottom && hunterHitbox.bottom > enemyHitbox.top;

        if (overlapX && overlapY && !$("#hunter").hasClass("jump")) {
            gameOver(score);
            break;
        }
    }
}

/* =====================
   GAME OVER
===================== */
function gameOver(finalScore) {
    clearInterval(scrollTimer);
    clearInterval(runTimer);

    $("#hunter").animate({ "margin-left": "-500px" });
    $("#score").html("Your Score : " + finalScore);
    $("#over").fadeIn(2000);
    $("#go").fadeOut();
    $("#reload").fadeIn(2000);
}

/* =====================
   CONTROLS
===================== */
function jump() {
    $("#hunter").addClass("jump");
}

function stopJump() {
    $("#hunter").removeClass("jump");
    setTimeout(createEnemy, 1000);
}

/* keyboard */
window.onkeydown = function (e) {
    if (e.keyCode === 32) jump();
};

window.onkeyup = function (e) {
    if (e.keyCode === 32) stopJump();
};

/* mouse */
window.onclick = function () {
    jump();
    setTimeout(stopJump, 1000);
};

/* =====================
   START LOOPS
===================== */
scrollTimer = setInterval(updateScroll, 10);
runTimer = setInterval(checkCollision, 10);

/* =====================
   RELOAD
===================== */
function reloadGame() {
    location.reload();
}
</script>

    <script>
        document.onkeydown = function (e) {
            if (
                e.ctrlKey &&
                (
                    e.keyCode === 67 ||
                    e.keyCode === 86 ||
                    e.keyCode === 85 ||
                    e.keyCode === 117
                )
            ) {
                return false;
            } else {
                return true;
            }
        };

        $(document).keypress("u", function (e) {
            if (e.ctrlKey) {
                return false;
            } else {
                return true;
            }
        });

        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        }, false);

        $(document).keydown(function (event) {
            if (event.keyCode == 123) {
                return false;
            } else if (event.ctrlKey && event.shiftKey && event.keyCode == 73) {
                return false;
            }
        });
    </script>

</body>
</html>
