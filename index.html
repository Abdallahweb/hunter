<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

<link rel="icon" href="./hunter.gif">
<title>Hunter Game</title>

<style>
    body {
    margin: 0 auto;
    background-image: url(forest.gif);
    width: 10000000000000000000000000000000px;
    height: 100vh;
    overflow: hidden;
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
}

.hunter {
    position: fixed;
    left: 10px;
    top: 100px;
}

.jump {
    margin-top: -100px;
    height: 300px;
}

.dangerous {
    position: absolute;
    top: 280px;
}

.score {
    background: transparent;
    color: #b6441b;
    font-size: 30px;
    border: none;
    font-weight: 700;
    text-shadow: -2px -1px gold;
}

.go,
.again {
    width: 200px;
    height: 40px;
    position: fixed;
    left: 50%;
    top: 550px;
    margin-left: -100px;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    z-index: 10000;
    background-color: rgba(0,0,0,.5);
    backdrop-filter: blur(50px);
    color: #fff;
}
</style>
</head>

<body onload="startGame()">

<!-- top info -->
<div style="text-align:center; position:fixed; left:50%; margin-left:-500px; width:1000px">
    <img src="./hunter.gif" width="50">
    <img src="./lion.gif" width="40">
    <br>
    <button class="score" id="score"></button>
</div>

<!-- hunter -->
<div class="hunter">
    <img src="./hunter.gif" id="hunter">
</div>

<button class="go" id="go">Click Space To Jump</button>

<button class="again" id="reload" onclick="reloadGame()" style="display:none;font-weight:700">
    Play Again
</button>

<img src="./over.jpg"
     id="over"
     style="position:fixed;top:120px;left:50%;width:550px;height:400px;margin-left:-275px;border-radius:100px;display:none">

<script src="./query.js"></script>

<script>
/* =====================
   GAME VARIABLES
===================== */
var score = 10;
var scrollTimer, runTimer;

/* =====================
   START GAME
===================== */
function startGame() {
    jump();
    stopJump();
    createEnemy();
}

/* =====================
   CREATE ENEMY
===================== */
function createEnemy() {
    $("body").append('<img src="./lion.gif" class="dangerous">');
    var enemyPos = $(window).scrollLeft() + 3000;
    $(".dangerous").last().css({ left: enemyPos });
}

/* =====================
   SCORE + SCROLL
===================== */
function updateScroll() {
    score += 10;
    $(window).scrollLeft(score);
    $("#score").html("Your Score : " + score);
}

/* =====================
   COLLISION CHECK
===================== */
function checkCollision() {
    var enemies = document.getElementsByClassName("dangerous");
    var scrollPos = $(window).scrollLeft();

    for (let i = 0; i < enemies.length; i++) {
        if (
            enemies[i].style.left === scrollPos + "px" &&
            !$("#hunter").hasClass("jump")
        ) {
            gameOver(scrollPos);
        }
    }
}

/* =====================
   GAME OVER
===================== */
function gameOver(finalScore) {
    clearInterval(scrollTimer);
    clearInterval(runTimer);

    $("#hunter").animate({ "margin-left": "-500px" });
    $("#score").html("Your Score : " + finalScore);
    $("#over").fadeIn(2000);
    $("#go").fadeOut();
    $("#reload").fadeIn(2000);
}

/* =====================
   CONTROLS
===================== */
function jump() {
    $("#hunter").addClass("jump");
}

function stopJump() {
    $("#hunter").removeClass("jump");
    setTimeout(createEnemy, 1000);
}

/* keyboard */
window.onkeydown = function (e) {
    if (e.keyCode === 32) jump();
};

window.onkeyup = function (e) {
    if (e.keyCode === 32) stopJump();
};

/* mouse */
window.onclick = function () {
    jump();
    setTimeout(stopJump, 1000);
};

/* =====================
   START LOOPS
===================== */
scrollTimer = setInterval(updateScroll, 10);
runTimer = setInterval(checkCollision, 10);

/* =====================
   RELOAD
===================== */
function reloadGame() {
    location.reload();
}
</script>

    <script>
        document.onkeydown = function (e) {
            if (
                e.ctrlKey &&
                (
                    e.keyCode === 67 ||
                    e.keyCode === 86 ||
                    e.keyCode === 85 ||
                    e.keyCode === 117
                )
            ) {
                return false;
            } else {
                return true;
            }
        };

        $(document).keypress("u", function (e) {
            if (e.ctrlKey) {
                return false;
            } else {
                return true;
            }
        });

        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        }, false);

        $(document).keydown(function (event) {
            if (event.keyCode == 123) {
                return false;
            } else if (event.ctrlKey && event.shiftKey && event.keyCode == 73) {
                return false;
            }
        });
    </script>

</body>
</html>
